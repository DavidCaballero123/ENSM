<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polígonos en Equilibrio - Aprendizaje Metacognitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0fdf4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        canvas {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            touch-action: none;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }
        .polygon-btn {
            transition: transform 0.2s, background-color 0.2s;
        }
        .polygon-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <div class="w-full max-w-4xl text-center mb-4">
        <h1 class="text-3xl font-bold text-emerald-700">Polígonos en Equilibrio</h1>
        <p class="text-emerald-600">Identifica la figura y reflexiona sobre tu pensamiento.</p>
    </div>

    <!-- Game Container -->
    <div class="relative w-full max-w-2xl">
        <div id="game-stats" class="flex justify-between mb-2 text-lg font-semibold text-emerald-800">
            <span>Nivel: <span id="level-display">1</span></span>
            <span>Puntos: <span id="score-display">0</span></span>
        </div>
        
        <canvas id="gameCanvas" class="w-full border-4 border-emerald-200"></canvas>

        <!-- Controls -->
        <div id="controls" class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-4">
            <!-- Buttons generated by JS -->
        </div>
    </div>

    <!-- Metacognition Modal -->
    <div id="meta-modal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl border-t-8 border-emerald-500">
            <h2 class="text-2xl font-bold text-emerald-800 mb-4 flex items-center">
                <span class="mr-2">🧠</span> Momento de Reflexión
            </h2>
            <p id="meta-question" class="text-gray-700 text-lg mb-6 leading-relaxed italic">
                ¿Cómo sabías que esa figura tenía 5 lados antes de contar uno por uno?
            </p>
            <textarea id="meta-answer" class="w-full p-3 border-2 border-emerald-100 rounded-lg mb-4 focus:border-emerald-500 outline-none" rows="3" placeholder="Escribe aquí tu pensamiento..."></textarea>
            <button id="close-meta" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-colors">
                Continuar el desafío
            </button>
        </div>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="feedback" class="pointer-events-none fixed inset-0 flex items-center justify-center z-40 opacity-0 transition-opacity duration-300">
        <div id="feedback-text" class="text-6xl font-black transform scale-50 transition-transform duration-300">
            ¡LOGRADO!
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisplay = document.getElementById('level-display');
        const scoreDisplay = document.getElementById('score-display');
        const controlsContainer = document.getElementById('controls');
        const metaModal = document.getElementById('meta-modal');
        const metaQuestionText = document.getElementById('meta-question');
        const metaAnswerInput = document.getElementById('meta-answer');
        const closeMetaBtn = document.getElementById('close-meta');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');

        // Configuración del juego
        let state = {
            level: 1,
            score: 0,
            currentPolygon: null,
            isPaused: false,
            shapesFound: 0
        };

        const polygons = [
            { name: 'Triángulo', sides: 3, color: '#ef4444' },
            { name: 'Cuadrado', sides: 4, color: '#3b82f6' },
            { name: 'Pentágono', sides: 5, color: '#10b981' },
            { name: 'Hexágono', sides: 6, color: '#f59e0b' },
            { name: 'Heptágono', sides: 7, color: '#8b5cf6' },
            { name: 'Octágono', sides: 8, color: '#ec4899' },
            { name: 'Eneágono', sides: 9, color: '#64748b' },
            { name: 'Decágono', sides: 10, color: '#0ea5e9' }
        ];

        const metaQuestions = [
            "¿En qué te fijaste primero para identificar el polígono?",
            "¿Qué estrategia usaste para no confundir esta figura con la anterior?",
            "Si tuvieras que explicarle a un amigo qué es un polígono regular, ¿qué le dirías?",
            "¿Qué figura te resultó más difícil de reconocer y por qué crees que fue así?",
            "¿Cómo ha cambiado tu forma de identificar las figuras desde que empezaste el juego?",
            "¿Sientes que estás más seguro de tus respuestas ahora? ¿Por qué?"
        ];

        // Inicializar Canvas
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 400;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Generar botones de control
        function createButtons() {
            controlsContainer.innerHTML = '';
            polygons.slice(0, Math.min(state.level + 2, polygons.length)).forEach(p => {
                const btn = document.createElement('button');
                btn.className = `polygon-btn bg-white border-2 border-emerald-500 text-emerald-700 font-bold py-3 px-2 rounded-xl shadow-md hover:bg-emerald-50`;
                btn.innerText = p.name;
                btn.onclick = () => checkAnswer(p.sides);
                controlsContainer.appendChild(btn);
            });
        }

        // Dibujar polígono regular
        function drawPolygon(sides, radius, color) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            ctx.beginPath();
            ctx.lineWidth = 8;
            ctx.lineJoin = 'round';
            ctx.strokeStyle = color;
            ctx.fillStyle = color + '22'; // Transparente

            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.fill();

            // Dibujar puntos en los vértices
            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
            }
        }

        function spawnPolygon() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Elige un polígono basado en el nivel actual
            const maxIdx = Math.min(state.level + 1, polygons.length - 1);
            const randomIdx = Math.floor(Math.random() * (maxIdx + 1));
            state.currentPolygon = polygons[randomIdx];
            
            drawPolygon(state.currentPolygon.sides, 120, state.currentPolygon.color);
        }

        function checkAnswer(sides) {
            if (state.isPaused) return;

            if (sides === state.currentPolygon.sides) {
                showFeedback(true);
                state.score += 10;
                state.shapesFound++;
                scoreDisplay.innerText = state.score;
                
                // Subir de nivel cada 3 figuras
                if (state.shapesFound % 3 === 0) {
                    state.level++;
                    levelDisplay.innerText = state.level;
                    createButtons();
                    setTimeout(triggerMetacognition, 600);
                } else {
                    setTimeout(spawnPolygon, 600);
                }
            } else {
                showFeedback(false);
            }
        }

        function showFeedback(correct) {
            feedback.style.opacity = '1';
            feedbackText.innerText = correct ? '¡CORRECTO!' : '¡INTENTA OTRA VEZ!';
            feedbackText.style.color = correct ? '#10b981' : '#ef4444';
            feedbackText.style.transform = 'scale(1)';
            
            setTimeout(() => {
                feedback.style.opacity = '0';
                feedbackText.style.transform = 'scale(0.5)';
            }, 500);
        }

        function triggerMetacognition() {
            state.isPaused = true;
            const randomQ = metaQuestions[Math.floor(Math.random() * metaQuestions.length)];
            metaQuestionText.innerText = randomQ;
            metaAnswerInput.value = '';
            metaModal.classList.remove('hidden');
        }

        closeMetaBtn.onclick = () => {
            if (metaAnswerInput.value.trim().length < 3) {
                // Pequeña validación para fomentar la escritura
                metaAnswerInput.classList.add('border-red-400');
                setTimeout(() => metaAnswerInput.classList.remove('border-red-400'), 500);
                return;
            }
            metaModal.classList.add('hidden');
            state.isPaused = false;
            spawnPolygon();
        };

        // Iniciar
        window.onload = () => {
            createButtons();
            spawnPolygon();
        };
    </script>
</body>
    </html>
