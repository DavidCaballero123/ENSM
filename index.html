<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ábaco Nepohuatzin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para la funcionalidad del ábaco */
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation; /* Mejora la respuesta táctil en móviles */
        }

        .bead {
            width: 50px;
            height: 25px;
            border-radius: 9999px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), 0 2px 3px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.2);
        }

        .bead:hover {
            transform: scale(1.05);
        }

        /* Define el movimiento de las cuentas cuando están activas (movidas hacia la barra) */
        .upper-bead.active {
            transform: translateY(34px); /* Mueve las cuentas superiores hacia abajo */
        }
        
        .lower-bead.active {
            transform: translateY(-34px); /* Mueve las cuentas inferiores hacia arriba */
        }
        
        /* Contenedor principal del ábaco para permitir el desplazamiento horizontal en pantallas pequeñas */
        .abacus-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Desplazamiento suave en iOS */
            scrollbar-width: thin;
            scrollbar-color: #4a5568 #2d3748;
        }

        /* Estilos para la barra de desplazamiento */
        .abacus-container::-webkit-scrollbar {
            height: 8px;
        }

        .abacus-container::-webkit-scrollbar-track {
            background: #2d3748;
            border-radius: 10px;
        }

        .abacus-container::-webkit-scrollbar-thumb {
            background-color: #4a5568;
            border-radius: 10px;
            border: 2px solid #2d3748;
        }
    </style>
</head>
<body class="bg-gray-800 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-5xl bg-gray-900 rounded-2xl shadow-2xl p-6 text-white text-center">
        <!-- Título y descripción -->
        <header class="mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-teal-300">Ábaco de Nepohuatzin</h1>
            <p class="text-gray-400 mt-2">
                Escuela Normal Superior.
            </p>
        </header>

        <!-- Pantalla para mostrar el valor total calculado -->
        <div id="display" class="bg-gray-800 rounded-lg p-4 mb-6 text-4xl md:text-5xl font-mono text-right break-all">0</div>

        <!-- El ábaco en sí -->
        <div class="abacus-container pb-4">
            <div id="abacus" class="bg-gray-800/50 inline-flex flex-nowrap gap-2 md:gap-3 p-4 rounded-lg border-2 border-gray-700 shadow-inner">
                <!-- Las varillas y cuentas se generarán aquí con JavaScript -->
            </div>
        </div>

        <!-- Botón para reiniciar el ábaco -->
        <button id="reset-button" class="mt-6 bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-8 rounded-lg transition-transform transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:ring-opacity-75">
            Reiniciar
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const abacusContainer = document.getElementById('abacus');
            const display = document.getElementById('display');
            const resetButton = document.getElementById('reset-button');
            const numRods = 13; 

            // Función para inicializar el ábaco, creando las varillas y las cuentas
            function initializeAbacus() {
                abacusContainer.innerHTML = ''; // Limpia el contenedor antes de dibujar

                // Crea cada varilla de derecha a izquierda (de menor a mayor valor posicional)
                for (let i = 0; i < numRods; i++) {
                    const placeValueExponent = BigInt(numRods - 1 - i);
                    const placeValue = 10n ** placeValueExponent; // Sistema decimal (base 10)

                    const rod = document.createElement('div');
                    // CAMBIO: Se elimina el color de fondo por defecto para añadirlo dinámicamente
                    rod.className = 'rod flex flex-col items-center p-1.5 rounded-md min-w-[70px]';
                    rod.dataset.placeValue = placeValue.toString();
                    
                    // --- Lógica de color para las columnas ---
                    let rodColorClass = '';
                    if (i === 0) {
                        // La primera columna (izquierda) es amarilla
                        rodColorClass = 'bg-yellow-800/40';
                    } else {
                        // Agrupa las siguientes 12 columnas en grupos de 3
                        const groupIndex = Math.floor((i - 1) / 3);
                        const colorPattern = groupIndex % 4; // Usamos 4 para el ciclo de colores

                        // Asigna colores según el patrón: rojo, azul, verde, rojo
                        switch(colorPattern) {
                            case 0: // Grupo 1 (índices 1,2,3) y Grupo 4 (índices 10,11,12)
                                rodColorClass = 'bg-red-800/40';
                                break;
                            case 1: // Grupo 2 (índices 4,5,6)
                                rodColorClass = 'bg-blue-800/40';
                                break;
                            case 2: // Grupo 3 (índices 7,8,9)
                                rodColorClass = 'bg-green-800/40';
                                break;
                            case 3: // Este caso ahora es el segundo grupo rojo
                                rodColorClass = 'bg-red-800/40';
                                // Como el patrón es rojo, azul, verde, rojo de nuevo, el último grupo debe ser rojo
                                // Re-calculamos el patrón para los 4 grupos de 3
                                const colorPatternFor12 = Math.floor((i - 1) / 3) % 4;
                                if (colorPatternFor12 === 0) rodColorClass = 'bg-red-800/40';
                                if (colorPatternFor12 === 1) rodColorClass = 'bg-blue-800/40';
                                if (colorPatternFor12 === 2) rodColorClass = 'bg-green-800/40';
                                if (colorPatternFor12 === 3) rodColorClass = 'bg-red-800/40'; // El último grupo es rojo
                                break;
                        }
                    }
                    rod.classList.add(rodColorClass);


                    // --- Cuentas Superiores (valor 5) ---
                    const upperDeck = document.createElement('div');
                    upperDeck.className = 'upper-deck flex flex-col gap-2 mb-2';
                    for (let j = 0; j < 3; j++) { 
                        const bead = document.createElement('div');
                        bead.className = 'bead upper-bead bg-blue-400';
                        bead.dataset.value = '5';
                        upperDeck.appendChild(bead);
                    }
                    
                    // --- Barra Central ---
                    const bar = document.createElement('div');
                    bar.className = 'bar w-full h-1.5 bg-black/50 rounded-full my-2';
                    
                    // --- Cuentas Inferiores (valor 1) ---
                    const lowerDeck = document.createElement('div');
                    lowerDeck.className = 'lower-deck flex flex-col gap-2 mt-2';
                    for (let k = 0; k < 4; k++) {
                        const bead = document.createElement('div');
                        bead.className = 'bead lower-bead bg-orange-400';
                        bead.dataset.value = '1';
                        lowerDeck.appendChild(bead);
                    }

                    // --- Indicador de Valor Posicional ---
                    const placeValueText = document.createElement('div');
                    placeValueText.className = 'place-value text-xs text-gray-400 mt-3 font-semibold';
                    placeValueText.textContent = `x${placeValue.toLocaleString('es-MX')}`;

                    rod.appendChild(upperDeck);
                    rod.appendChild(bar);
                    rod.appendChild(lowerDeck);
                    rod.appendChild(placeValueText);
                    abacusContainer.appendChild(rod);
                }
                addBeadListeners(); // Asigna los eventos a las nuevas cuentas
            }

            // Función para calcular el valor total y actualizar la pantalla
            function calculateTotal() {
                let totalValue = 0n; 
                const rods = document.querySelectorAll('.rod');

                rods.forEach(rod => {
                    const placeValue = BigInt(rod.dataset.placeValue);
                    let rodValue = 0;

                    rod.querySelectorAll('.upper-bead.active').forEach(bead => {
                        rodValue += parseInt(bead.dataset.value, 10);
                    });

                    rod.querySelectorAll('.lower-bead.active').forEach(bead => {
                        rodValue += parseInt(bead.dataset.value, 10);
                    });
                    
                    totalValue += BigInt(rodValue) * placeValue;
                });

                display.textContent = totalValue.toLocaleString('es-MX');
            }

            // Función para manejar el clic en una cuenta
            function handleBeadClick(event) {
                if (event.target.classList.contains('bead')) {
                    event.target.classList.toggle('active');
                    calculateTotal();
                }
            }
            
            // Función para asignar los event listeners a todas las cuentas
            function addBeadListeners() {
                const beads = document.querySelectorAll('.bead');
                beads.forEach(bead => {
                    bead.addEventListener('click', handleBeadClick);
                });
            }

            // Función para reiniciar el estado del ábaco
            function resetAbacus() {
                document.querySelectorAll('.bead.active').forEach(bead => {
                    bead.classList.remove('active');
                });
                calculateTotal(); // Actualiza la pantalla a 0
            }

            // --- Eventos Iniciales ---
            resetButton.addEventListener('click', resetAbacus);
            initializeAbacus(); // Dibuja el ábaco al cargar la página
        });
    </script>
</body>
</html>
